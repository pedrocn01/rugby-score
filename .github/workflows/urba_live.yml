name: URBA Top 14 - Resultados en vivo

on:
  schedule:
    # Cada 5 minutos, sábados de 14:00 a 23:00 UTC (11:00-20:00 Argentina)
    - cron: '*/5 14-23 * * 6'
  # Permite correrlo manualmente desde GitHub para probar
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r urba_scraper/requirements.txt

      - name: Correr scraper en vivo
        env:
          WORKER_URL:        ${{ secrets.WORKER_URL }}
          LIVE_SECRET_TOKEN: ${{ secrets.LIVE_SECRET_TOKEN }}
        run: python urba_scraper/datafactory_live.py
