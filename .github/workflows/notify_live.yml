name: Notificaciones en vivo — Todos los equipos

on:
  schedule:
    # Lunes a jueves: 17-23 UTC (14-20 Argentina) — Super Rugby Pacific, URC midweek
    - cron: '*/5 17-23 * * 1-4'
    # Viernes: 15-23 UTC (12-20 Argentina) — Champions Cup, URC, Top 14
    - cron: '*/5 15-23 * * 5'
    # Sábado: 12-23 UTC (9-20 Argentina) — día principal de rugby
    - cron: '*/5 12-23 * * 6'
    # Domingo: 12-23 UTC (9-20 Argentina) — Super Rugby, Premiership
    - cron: '*/5 12-23 * * 0'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r urba_scraper/requirements.txt

      - name: Enviar notificaciones
        env:
          WORKER_URL:               ${{ secrets.WORKER_URL }}
          LIVE_SECRET_TOKEN:        ${{ secrets.LIVE_SECRET_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          APP_SECRET:               ${{ secrets.APP_SECRET }}
        run: python urba_scraper/firebase_notify.py
