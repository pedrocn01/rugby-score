<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rugby Score — Opciones de Logo</title>
<style>
  body { background: #111; font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 40px; padding: 40px; justify-content: center; }
  .option { background: #1a1a1a; border-radius: 20px; padding: 32px; display: flex; flex-direction: column; align-items: center; gap: 16px; width: 220px; border: 1px solid #2a2a2a; }
  .label { color: #4A7C59; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .desc  { color: #888; font-size: 11px; text-align: center; line-height: 1.5; }
  .dark-bg  { background: #0A1F13; border-radius: 12px; padding: 16px; }
  .light-bg { background: #fff; border-radius: 12px; padding: 16px; }
</style>
</head>
<body>

<!-- ───── OPCIÓN 1: Pelota sola ───── -->
<div class="option">
  <div class="label">Opción 1</div>
  <div class="dark-bg">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Pelota rugby oval -->
      <ellipse cx="40" cy="40" rx="30" ry="20" fill="#1B4332" stroke="#4A9C6F" stroke-width="2"/>
      <!-- Costura central horizontal -->
      <line x1="10" y1="40" x2="70" y2="40" stroke="#4A9C6F" stroke-width="1.5"/>
      <!-- Costuras curvas verticales -->
      <path d="M40 20 Q48 40 40 60" fill="none" stroke="#4A9C6F" stroke-width="1.5"/>
      <path d="M40 20 Q32 40 40 60" fill="none" stroke="#4A9C6F" stroke-width="1.5"/>
      <!-- Brillo -->
      <ellipse cx="30" cy="33" rx="8" ry="4" fill="white" opacity="0.08"/>
    </svg>
  </div>
  <div class="dark-bg" style="background:#fff">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="40" cy="40" rx="30" ry="20" fill="#1B4332" stroke="#2D6A4F" stroke-width="2"/>
      <line x1="10" y1="40" x2="70" y2="40" stroke="#4A9C6F" stroke-width="1.5"/>
      <path d="M40 20 Q48 40 40 60" fill="none" stroke="#4A9C6F" stroke-width="1.5"/>
      <path d="M40 20 Q32 40 40 60" fill="none" stroke="#4A9C6F" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="desc">Pelota sola<br>fondo oscuro / claro</div>
</div>

<!-- ───── OPCIÓN 2: Pelota + RS ───── -->
<div class="option">
  <div class="label">Opción 2</div>
  <div class="dark-bg">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="40" cy="40" rx="30" ry="20" fill="#1B4332" stroke="#4A9C6F" stroke-width="2"/>
      <line x1="10" y1="40" x2="70" y2="40" stroke="#4A9C6F" stroke-width="1" opacity="0.5"/>
      <path d="M40 20 Q47 40 40 60" fill="none" stroke="#4A9C6F" stroke-width="1" opacity="0.5"/>
      <path d="M40 20 Q33 40 40 60" fill="none" stroke="#4A9C6F" stroke-width="1" opacity="0.5"/>
      <!-- RS centrado -->
      <text x="40" y="45" text-anchor="middle" fill="white" font-size="18" font-weight="900" font-family="Georgia, serif" letter-spacing="-1">RS</text>
    </svg>
  </div>
  <div class="dark-bg" style="background:#fff">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="40" cy="40" rx="30" ry="20" fill="#1B4332" stroke="#2D6A4F" stroke-width="2"/>
      <line x1="10" y1="40" x2="70" y2="40" stroke="#4A9C6F" stroke-width="1" opacity="0.4"/>
      <path d="M40 20 Q47 40 40 60" fill="none" stroke="#4A9C6F" stroke-width="1" opacity="0.4"/>
      <path d="M40 20 Q33 40 40 60" fill="none" stroke="#4A9C6F" stroke-width="1" opacity="0.4"/>
      <text x="40" y="45" text-anchor="middle" fill="white" font-size="18" font-weight="900" font-family="Georgia, serif" letter-spacing="-1">RS</text>
    </svg>
  </div>
  <div class="desc">Iniciales RS<br>dentro de la pelota</div>
</div>

<!-- ───── OPCIÓN 3: Pelota + texto apilado ───── -->
<div class="option">
  <div class="label">Opción 3</div>
  <div class="dark-bg">
    <svg width="120" height="70" viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg">
      <!-- Pelota izquierda -->
      <ellipse cx="25" cy="35" rx="20" ry="14" fill="#1B4332" stroke="#4A9C6F" stroke-width="1.5"/>
      <line x1="5" y1="35" x2="45" y2="35" stroke="#4A9C6F" stroke-width="1"/>
      <path d="M25 21 Q31 35 25 49" fill="none" stroke="#4A9C6F" stroke-width="1"/>
      <path d="M25 21 Q19 35 25 49" fill="none" stroke="#4A9C6F" stroke-width="1"/>
      <!-- Texto derecho -->
      <text x="52" y="30" fill="white" font-size="14" font-weight="900" font-family="Georgia, serif" letter-spacing="2">RUGBY</text>
      <text x="52" y="48" fill="#4A9C6F" font-size="13" font-weight="700" font-family="sans-serif" letter-spacing="3">SCORE</text>
    </svg>
  </div>
  <div class="dark-bg" style="background:#fff">
    <svg width="120" height="70" viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="25" cy="35" rx="20" ry="14" fill="#1B4332" stroke="#2D6A4F" stroke-width="1.5"/>
      <line x1="5" y1="35" x2="45" y2="35" stroke="#4A9C6F" stroke-width="1"/>
      <path d="M25 21 Q31 35 25 49" fill="none" stroke="#4A9C6F" stroke-width="1"/>
      <path d="M25 21 Q19 35 25 49" fill="none" stroke="#4A9C6F" stroke-width="1"/>
      <text x="52" y="30" fill="#1B4332" font-size="14" font-weight="900" font-family="Georgia, serif" letter-spacing="2">RUGBY</text>
      <text x="52" y="48" fill="#2D6A4F" font-size="13" font-weight="700" font-family="sans-serif" letter-spacing="3">SCORE</text>
    </svg>
  </div>
  <div class="desc">Pelota + nombre<br>horizontal</div>
</div>

<!-- ───── OPCIÓN 4: R con pelota integrada ───── -->
<div class="option">
  <div class="label">Opción 4</div>
  <div class="dark-bg">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Cuadrado redondeado de fondo -->
      <rect width="80" height="80" rx="16" fill="#1B4332"/>
      <!-- Pelota grande de fondo como watermark -->
      <ellipse cx="52" cy="40" rx="26" ry="18" fill="none" stroke="#2D6A4F" stroke-width="8" opacity="0.5"/>
      <!-- R grande -->
      <text x="14" y="55" fill="white" font-size="44" font-weight="900" font-family="Georgia, serif">R</text>
      <!-- S pequeño abajo derecha -->
      <text x="52" y="66" fill="#4A9C6F" font-size="18" font-weight="700" font-family="sans-serif">S</text>
    </svg>
  </div>
  <div class="dark-bg" style="background:#fff">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="80" height="80" rx="16" fill="#1B4332"/>
      <ellipse cx="52" cy="40" rx="26" ry="18" fill="none" stroke="#2D6A4F" stroke-width="8" opacity="0.5"/>
      <text x="14" y="55" fill="white" font-size="44" font-weight="900" font-family="Georgia, serif">R</text>
      <text x="52" y="66" fill="#4A9C6F" font-size="18" font-weight="700" font-family="sans-serif">S</text>
    </svg>
  </div>
  <div class="desc">R grande + pelota<br>como ícono de app</div>
</div>

<!-- ───── OPCIÓN 5: Pelota con postes ───── -->
<div class="option">
  <div class="label">Opción 5</div>
  <div class="dark-bg">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Postes H -->
      <line x1="28" y1="12" x2="28" y2="42" stroke="#4A9C6F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="52" y1="12" x2="52" y2="42" stroke="#4A9C6F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="28" y1="24" x2="52" y2="24" stroke="#4A9C6F" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Pelota -->
      <ellipse cx="40" cy="57" rx="22" ry="15" fill="#1B4332" stroke="#4A9C6F" stroke-width="2"/>
      <line x1="18" y1="57" x2="62" y2="57" stroke="#4A9C6F" stroke-width="1.2"/>
      <path d="M40 42 Q47 57 40 72" fill="none" stroke="#4A9C6F" stroke-width="1.2"/>
      <path d="M40 42 Q33 57 40 72" fill="none" stroke="#4A9C6F" stroke-width="1.2"/>
    </svg>
  </div>
  <div class="dark-bg" style="background:#fff">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <line x1="28" y1="12" x2="28" y2="42" stroke="#2D6A4F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="52" y1="12" x2="52" y2="42" stroke="#2D6A4F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="28" y1="24" x2="52" y2="24" stroke="#2D6A4F" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="40" cy="57" rx="22" ry="15" fill="#1B4332" stroke="#2D6A4F" stroke-width="2"/>
      <line x1="18" y1="57" x2="62" y2="57" stroke="#4A9C6F" stroke-width="1.2"/>
      <path d="M40 42 Q47 57 40 72" fill="none" stroke="#4A9C6F" stroke-width="1.2"/>
      <path d="M40 42 Q33 57 40 72" fill="none" stroke="#4A9C6F" stroke-width="1.2"/>
    </svg>
  </div>
  <div class="desc">Pelota + postes<br>de conversión</div>
</div>

</body>
</html>
